<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم بوتات ماين كرافت</title>
    <style>
        body { font-family: Arial, sans-serif; background: #2c3e50; color: white; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .bot-card { background: #34495e; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        input, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        button { background: #27ae60; color: white; cursor: pointer; }
        button.stop { background: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>إدارة بوتات بيدروك</h1>
        
        <div class="bot-card">
            <h3>إضافة بوت جديد</h3>
            <input type="text" id="username" placeholder="اسم البوت">
            <input type="text" id="host" placeholder="آيبي السيرفر (IP)">
            <input type="number" id="port" placeholder="البورت (غالباً 19132)" value="19132">
            <button onclick="addBot()">حفظ البوت</button>
        </div>

        <div id="botsList"></div>
    </div>

    <script>
        async function fetchBots() {
            const res = await fetch('/api/bots');
            const bots = await res.json();
            const list = document.getElementById('botsList');
            list.innerHTML = '';
            bots.forEach(bot => {
                list.innerHTML += `
                    <div class="bot-card">
                        <h3>${bot.username}</h3>
                        <p><strong>السيرفر:</strong> ${bot.host}:${bot.port}</p>
                        <p><strong>الحالة:</strong> ${bot.status}</p>
                        <p><strong>مدة الاتصال:</strong> ${bot.uptime}</p>
                        <p><strong>الإحداثيات:</strong> ${bot.coordinates}</p>
                        <button onclick="startBot('${bot.id}')">تشغيل</button>
                        <button class="stop" onclick="stopBot('${bot.id}')">إيقاف</button>
                    </div>
                `;
            });
        }

        async function addBot() {
            const username = document.getElementById('username').value;
            const host = document.getElementById('host').value;
            const port = document.getElementById('port').value;
            await fetch('/api/bots', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, host, port })
            });
            fetchBots();
        }

        async function startBot(id) {
            await fetch(`/api/bots/${id}/start`, { method: 'POST' });
            fetchBots();
        }

        async function stopBot(id) {
            await fetch(`/api/bots/${id}/stop`, { method: 'POST' });
            fetchBots();
        }

        // تحديث البيانات كل 5 ثواني
        setInterval(fetchBots, 5000);
        fetchBots();
    </script>
</body>
</html>
