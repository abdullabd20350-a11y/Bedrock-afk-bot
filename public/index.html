<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; padding: 20px; }
        .card { background: #16213e; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #0f3460; }
        input, button { padding: 8px; margin: 5px; border-radius: 4px; border: none; }
        button { cursor: pointer; background: #e94560; color: white; }
        .start-btn { background: #0f9d58; }
    </style>
</head>
<body>
    <h1>إدارة بوتات ماين كرافت</h1>
    <div class="card">
        <input type="text" id="user" placeholder="اسم البوت">
        <input type="text" id="host" placeholder="IP السيرفر">
        <input type="number" id="port" value="19132">
        <button onclick="addBot()" class="start-btn">إضافة بوت</button>
    </div>
    <div id="list"></div>

    <script>
        async function loadBots() {
            const res = await fetch('/api/bots');
            const data = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = data.map(bot => `
                <div class="card">
                    <h3>${bot.username} (${bot.host})</h3>
                    <p>الحالة: ${bot.status} | الإحداثيات: ${bot.coordinates}</p>
                    <p>متصل منذ: ${bot.uptime}</p>
                    <button class="start-btn" onclick="startBot('${bot.id}')">تشغيل</button>
                    <button onclick="stopBot('${bot.id}')">إيقاف</button>
                </div>
            `).join('');
        }
        async function addBot() {
            const username = document.getElementById('user').value;
            const host = document.getElementById('host').value;
            const port = document.getElementById('port').value;
            await fetch('/api/bots', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, host, port})
            });
            loadBots();
        }
        async function startBot(id) { await fetch(`/api/bots/${id}/start`, {method: 'POST'}); loadBots(); }
        async function stopBot(id) { await fetch(`/api/bots/${id}/stop`, {method: 'POST'}); loadBots(); }
        setInterval(loadBots, 3000);
        loadBots();
    </script>
</body>
</html>
