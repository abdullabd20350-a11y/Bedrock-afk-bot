<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدير البوتات</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #334155; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; margin: 5px; }
        button { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-add { background: #3b82f6; color: white; }
        .btn-start { background: #10b981; color: white; }
        .btn-stop { background: #f59e0b; color: white; }
        .btn-del { background: #ef4444; color: white; }
        .coords { color: #10b981; font-family: monospace; display: block; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🤖 مدير بوتات بيدروك</h1>
    
    <div class="card">
        <h3>إضافة بوت جديد</h3>
        <input type="text" id="u" placeholder="اسم البوت">
        <input type="text" id="h" placeholder="IP السيرفر">
        <input type="number" id="p" value="19132">
        <button class="btn-add" onclick="addBot()">حفظ وإضافة</button>
    </div>

    <div id="list"></div>

    <script>
        async function fetchBots() {
            const r = await fetch('/api/bots');
            const bots = await r.json();
            const list = document.getElementById('list');
            list.innerHTML = bots.map(b => `
                <div class="card">
                    <h3>${b.username}</h3>
                    <p>${b.host}:${b.port} | <b>${b.status}</b> | ⏱️ ${b.uptime}</p>
                    <span class="coords">${b.coordinates}</span>
                    <button class="btn-start" onclick="action('${b.id}', 'start')">تشغيل</button>
                    <button class="btn-stop" onclick="action('${b.id}', 'stop')">إيقاف</button>
                    <button class="btn-del" onclick="delBot('${b.id}')">حذف نهائي</button>
                </div>
            `).join('');
        }

        async function addBot() {
            const username = document.getElementById('u').value;
            const host = document.getElementById('h').value;
            const port = document.getElementById('p').value;
            if(!username || !host) return alert("املاً البيانات");
            await fetch('/api/bots', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, host, port})
            });
            fetchBots();
        }

        async function action(id, type) {
            await fetch(`/api/bots/${id}/${type}`, {method: 'POST'});
            fetchBots();
        }

        // 🟢 دالة الحذف في الواجهة
        async function delBot(id) {
            if(confirm("هل تريد حذف هذا البوت نهائياً من القائمة؟")) {
                const res = await fetch(`/api/bots/${id}`, { method: 'DELETE' });
                if(res.ok) {
                    fetchBots(); // تحديث القائمة فوراً بعد الحذف
                }
            }
        }

        setInterval(fetchBots, 3000);
        fetchBots();
    </script>
</body>
</html>
