<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم بوتات Bedrock</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2f; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        h1 { text-align: center; color: #4CAF50; }
        .card { background: #2a2a40; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        input { padding: 10px; margin: 5px 0; width: calc(100% - 22px); border-radius: 5px; border: 1px solid #444; background: #1e1e2f; color: white; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-start { background-color: #4CAF50; color: white; }
        .btn-stop { background-color: #f44336; color: white; width: auto; }
        .bot-item { background: #3f3f5a; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .status-online { color: #4CAF50; font-weight: bold; }
        .status-offline { color: #f44336; font-weight: bold; }
        .status-connecting { color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 لوحة تحكم بوتات Bedrock</h1>
    
    <div class="card">
        <h3>إضافة بوت جديد</h3>
        <input type="text" id="botUsername" placeholder="اسم البوت">
        <input type="text" id="serverIp" placeholder="آيبي السيرفر">
        <input type="number" id="serverPort" placeholder="البورت (الافتراضي: 19132)" value="19132">
        <button class="btn-start" onclick="startBot()">🚀 تشغيل البوت</button>
    </div>

    <div class="card">
        <h3>البوتات النشطة</h3>
        <div id="botsList"></div>
    </div>
</div>

<script>
    async function fetchBots() {
        try {
            const response = await fetch('/api/bots');
            const bots = await response.json();
            const botsList = document.getElementById('botsList');
            botsList.innerHTML = '';

            if (bots.length === 0) {
                botsList.innerHTML = '<p style="text-align: center; color: #aaa;">لا توجد بوتات حالياً.</p>';
                return;
            }

            bots.forEach(bot => {
                let statusClass = 'status-offline';
                if (bot.status === 'Online') statusClass = 'status-online';
                if (bot.status === 'Connecting...') statusClass = 'status-connecting';

                botsList.innerHTML += `
                    <div class="bot-item">
                        <div>
                            <strong>${bot.username}</strong> | السيرفر: ${bot.serverIp}:${bot.port} | <span class="${statusClass}">${bot.status}</span><br>
                            <small>X:${bot.coordinates.x} Y:${bot.coordinates.y} Z:${bot.coordinates.z}</small> | <small>مدة: ${bot.uptime} ثانية</small>
                        </div>
                        <button class="btn-stop" onclick="stopBot('${bot.id}')">إيقاف 🛑</button>
                    </div>
                `;
            });
        } catch (err) { console.error(err); }
    }

    async function startBot() {
        const username = document.getElementById('botUsername').value;
        const host = document.getElementById('serverIp').value;
        const port = document.getElementById('serverPort').value;
        
        if (!username || !host) return alert('أدخل الاسم والآيبي!');

        const botId = 'bot_' + Date.now();
        await fetch('/api/bots/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: botId, username, host, port: parseInt(port) })
        });
        
        document.getElementById('botUsername').value = ''; 
        fetchBots();
    }

    async function stopBot(id) {
        await fetch('/api/bots/stop', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
        fetchBots();
    }

    setInterval(fetchBots, 3000);
    fetchBots();
</script>
</body>
</html>
